# Serenity BDD Properties
webdriver.driver=chrome
webdriver.autodownload=true
webdriver.base.url=http://localhost:5173

# Report output directory (Gradle convention, NOT Maven target/)
serenity.outputDirectory=build/reports/serenity

# Chrome options
chrome.switches=--remote-allow-origins=*,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080

# Serenity configuration
serenity.take.screenshots=FOR_FAILURES
serenity.logging=VERBOSE
serenity.test.root=com.reservassofka.pom

# Test credentials
test.reservation.email=admin@sofka.com.co
test.reservation.password=password1234

# Timeouts (in milliseconds)
webdriver.timeouts.implicitlywait=5000
serenity.timeout=10000
