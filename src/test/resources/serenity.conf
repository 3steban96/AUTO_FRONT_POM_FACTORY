serenity {
    take.screenshots = FOR_FAILURES
    test.root = "com.reservassofka.pom"
    logging = "VERBOSE"
    outputDirectory = "build/reports/serenity"
}

webdriver {
    driver = chrome
    autodownload = true
    base.url = "http://localhost:5173"
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = [
                "remote-allow-origins=*",
                "test-type",
                "no-sandbox",
                "ignore-certificate-errors",
                "--window-size=1920,1080",
                "incognito",
                "disable-infobars",
                "disable-gpu",
                "disable-default-apps",
                "disable-popup-blocking",
                "use-fake-ui-for-media-stream",
                "use-fake-device-for-media-stream"
            ]
        }
    }
}

headless.mode = false
